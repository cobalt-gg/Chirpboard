name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: ChirpBoard version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 / Ubuntu 24.04
    validations:
      required: true
